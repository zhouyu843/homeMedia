<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Asset.OriginalFilename}} - 媒体库</title>
    <style>
        :root {
            --bg: #f4f5f8;
            --surface: #ffffff;
            --text: #1f2937;
            --line: #dbe1ea;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .shell {
            width: min(840px, 100% - 2rem);
            margin: 1.5rem auto 2rem;
            display: grid;
            gap: 1rem;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
        }
        .topbar a { color: #0f766e; text-decoration: none; }
        .topbar a:hover { text-decoration: underline; }
        .btn {
            border: 1px solid var(--line);
            background: #fff;
            border-radius: 999px;
            padding: 0.45rem 0.9rem;
            cursor: pointer;
        }
        .btn-danger {
            border-color: #fecaca;
            background: #fff1f2;
            color: #b91c1c;
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 1rem;
        }
        h1 { margin: 0; font-size: clamp(1.2rem, 1.05rem + 0.85vw, 1.7rem); }
        dl { display: grid; grid-template-columns: 8rem 1fr; gap: 0.7rem 0.85rem; margin: 0; }
        dt { font-weight: 600; }
        .preview { margin: 0; }
        .preview img, .preview video {
            width: 100%;
            max-height: 70vh;
            border-radius: 0.5rem;
            background: #111;
            object-fit: contain;
        }
        .download {
            color: #0f766e;
            text-decoration: none;
            font-weight: 600;
        }
        .actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .delete-form {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <a href="/media">返回列表</a>
            <div style="display:flex; align-items:center; gap:0.75rem;">
                <a href="/trash">回收站</a>
                <form action="/logout" method="post">
                    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                    <button class="btn" type="submit">退出登录</button>
                </form>
            </div>
        </header>

        <section class="panel">
            <h1>{{.Asset.OriginalFilename}}</h1>
        </section>

        <section class="panel preview">
            {{if eq .Asset.MediaType "image"}}
            <img src="/media/{{.Asset.ID}}/view" alt="{{.Asset.OriginalFilename}}">
            {{else if eq .Asset.MediaType "video"}}
            <video controls preload="metadata">
                <source src="/media/{{.Asset.ID}}/view" type="{{.Asset.MIMEType}}">
                当前浏览器不支持视频播放。
            </video>
            {{end}}
        </section>

        <section class="panel">
            <dl>
                <dt>ID</dt><dd>{{.Asset.ID}}</dd>
                <dt>媒体类型</dt><dd>{{.Asset.MediaType}}</dd>
                <dt>MIME</dt><dd>{{.Asset.MIMEType}}</dd>
                <dt>大小</dt><dd>{{.Asset.SizeBytes}}</dd>
                <dt>上传时间</dt><dd>{{.Asset.CreatedAt.Format "2006-01-02 15:04:05"}}</dd>
            </dl>
        </section>

        <section class="panel">
            <div class="actions">
                <a class="download" href="/media/{{.Asset.ID}}/download">下载原文件</a>
                <form class="delete-form" action="/media/{{.Asset.ID}}/delete" method="post" onsubmit="return confirm('确定将这个媒体移入回收站吗？之后仍可恢复。');">
                    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                    <button class="btn btn-danger" type="submit">移入回收站</button>
                </form>
            </div>
        </section>
    </div>
</body>
</html>
