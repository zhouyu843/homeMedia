<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媒体库</title>
    <style>
        :root {
            --bg: #f4f5f8;
            --surface: #ffffff;
            --text: #1f2937;
            --line: #dbe1ea;
            --muted: #4b5563;
            --accent: #134e4a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: radial-gradient(circle at 80% -10%, #dbeafe 0%, var(--bg) 48%);
            color: var(--text);
            transition: background 140ms ease;
        }
        body.upload-page-drag-active {
            background: radial-gradient(circle at 50% 0%, #ccfbf1 0%, var(--bg) 54%);
        }
        .shell {
            width: min(1120px, 100% - 2rem);
            margin: 1.5rem auto 2rem;
            display: grid;
            gap: 1.25rem;
            transition: transform 140ms ease, filter 140ms ease;
        }
        body.upload-page-drag-active .shell {
            transform: scale(0.995);
            filter: saturate(1.04);
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        h1 {
            margin: 0;
            font-size: clamp(1.5rem, 1.3rem + 0.8vw, 2rem);
            letter-spacing: 0.02em;
        }
        .logout-form { margin: 0; }
        .btn {
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--text);
            border-radius: 999px;
            padding: 0.5rem 0.95rem;
            cursor: pointer;
            font-size: 0.92rem;
        }
        .upload {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.65rem;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 0.85rem;
        }
        .upload label { font-size: 0.9rem; color: var(--muted); }
        .upload input[type="file"] {
            max-width: 100%;
            border: 1px dashed var(--line);
            border-radius: 10px;
            padding: 0.45rem;
            background: #fbfdff;
        }
        .upload button {
            border: none;
            background: var(--accent);
            color: #fff;
            border-radius: 10px;
            padding: 0.55rem 0.9rem;
            cursor: pointer;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 0.9rem;
        }

        @media (max-width: 740px) {
            .gallery {
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 0.55rem;
            }
            .name {
                padding: 0.45rem;
                font-size: 0.78rem;
            }
        }

        @media (max-width: 420px) {
            .gallery {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
            .name {
                font-size: 0.74rem;
            }
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
            transform: translateY(0);
            transition: transform 160ms ease;
            display: grid;
            position: relative;
        }
        .card:hover { transform: translateY(-2px); }
        .card-link {
            display: grid;
            text-decoration: none;
            color: inherit;
        }
        .thumb-wrap {
            margin: 0;
            aspect-ratio: 4 / 3;
            background: #e2e8f0;
            position: relative;
            overflow: hidden;
        }
        .thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .badge {
            position: absolute;
            top: 0.45rem;
            left: 0.45rem;
            background: rgba(0, 0, 0, 0.72);
            color: #fff;
            padding: 0.18rem 0.45rem;
            border-radius: 999px;
            font-size: 0.72rem;
            letter-spacing: 0.04em;
        }
        .name {
            margin: 0;
            padding: 0.7rem;
            font-size: 0.9rem;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .empty {
            background: var(--surface);
            border: 1px dashed var(--line);
            border-radius: 12px;
            padding: 1.25rem;
            color: var(--muted);
        }
        .card-delete {
            position: absolute;
            top: 0.55rem;
            right: 0.55rem;
            margin: 0;
            z-index: 2;
        }
        .card-delete button {
            border: 1px solid rgba(248, 113, 113, 0.55);
            background: rgba(255, 241, 242, 0.96);
            color: #b91c1c;
            border-radius: 999px;
            padding: 0.28rem 0.62rem;
            font-size: 0.76rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <h1>媒体库</h1>
            <form class="logout-form" action="/logout" method="post">
                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                <button class="btn" type="submit">退出登录</button>
            </form>
        </header>

        <form class="upload" action="/uploads" method="post" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            <label for="file">上传图片或视频</label>
            <input id="file" name="file" type="file" required>
            <button type="submit">上传</button>
        </form>
        <div
            id="upload-island-root"
            data-csrf-token="{{.CSRFToken}}"
            data-max-upload-bytes="{{.MaxUploadBytes}}"
            data-allowed-mime-types="{{.AllowedMIMETypesCSV}}"
            data-upload-url="/api/uploads"
        ></div>

        {{if .Assets}}
        <section class="gallery">
            {{range .Assets}}
            <article class="card">
                <form class="card-delete" action="/media/{{.ID}}/delete" method="post" onsubmit="return confirm('确定直接删除这个媒体吗？删除后不可恢复。');">
                    <input type="hidden" name="csrf_token" value="{{$.CSRFToken}}">
                    <button type="submit">删除</button>
                </form>
                <a class="card-link" href="/media/{{.ID}}">
                    <figure class="thumb-wrap">
                        {{if eq .MediaType "image"}}
                        <img src="/media/{{.ID}}/thumbnail" alt="{{.OriginalFilename}}" loading="lazy" data-thumb-kind="image" data-fallback-src="/media/{{.ID}}/view">
                        {{else}}
                        <img src="/media/{{.ID}}/thumbnail" alt="{{.OriginalFilename}}" loading="lazy" data-thumb-kind="video">
                        {{if eq .MediaType "video"}}<span class="badge">VIDEO</span>{{end}}
                        {{end}}
                    </figure>
                    <p class="name">{{.OriginalFilename}}</p>
                </a>
            </article>
            {{end}}
        </section>
        {{else}}
        <p class="empty">还没有上传任何媒体。</p>
        {{end}}
    </div>
    <script type="module" src="/static/react/upload-island.js?v=20260406-1"></script>
</body>
</html>
